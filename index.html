<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Explorando o Universo</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #0b0c10;
            color: #ffffff;
            margin: 0;
            padding: 0;
        }
        header {
            background-color: #1f2833;
            padding: 20px;
            text-align: center;
        }
        header h1 {
            margin: 0;
            font-size: 2.5em;
            color: #66fcf1;
        }
        main {
            padding: 20px;
        }
        .gallery {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
        }
        .gallery img {
            width: 300px;
            border-radius: 10px;
            transition: transform 0.3s;
        }
        .gallery img:hover {
            transform: scale(1.05);
        }
        footer {
            background-color: #1f2833;
            text-align: center;
            padding: 10px;
            margin-top: 20px;
            color: #c5c6c7;
        }
    </style>
</head>
<body>

<header>
    <h1>Explorando o Universo</h1>
</header>

<main>
    <p>Bem-vindo ao nosso site de astronomia! Aqui você encontra imagens incríveis do espaço, planetas, galáxias e muito mais.</p>

    <div class="gallery">
        <img src="https://upload.wikimedia.org/wikipedia/commons/9/99/Hubble_2005-01-barred-spiral-galaxy.jpg" alt="Galáxia Espiral">
        <img src="https://upload.wikimedia.org/wikipedia/commons/e/e1/NGC_2442_HST.jpg" alt="Galáxia NGC 2442">
        <img src="https://upload.wikimedia.org/wikipedia/commons/3/3f/Milky_Way_Galaxy.jpg" alt="Via Láctea">
        <img src="https://upload.wikimedia.org/wikipedia/commons/4/4f/FullMoon2010.jpg" alt="Lua Cheia">
        <img src="https://upload.wikimedia.org/wikipedia/commons/e/e6/Jupiter_by_Cassini-Huygens.jpg" alt="Júpiter">
    </div>
</main>

<footer>
    <p>&copy; 2026 Explorando o Universo. Todos os direitos reservados.</p>
</footer>

</body>
</html>
