<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exploração Astronômica</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Bem-vindo à Exploração Astronômica!</h1>
        <nav>
            <ul>
                <li><a href="#planetas">Planetas</a></li>
                <li><a href="#estrelas">Estrelas</a></li>
                <li><a href="#galaxias">Galáxias</a></li>
            </ul>
        </nav>
    </header>

    <section id="planetas">
        <h2>Planetas</h2>
        <div class="image-container">
            <img src="imagens/planeta.jpg" alt="Imagem de um planeta">
        </div>
    </section>

    <section id="estrelas">
        <h2>Estrelas</h2>
        <div class="image-container">
            <img src="imagens/estrela.jpg" alt="Imagem de uma estrela">
        </div>
    </section>

    <section id="galaxias">
        <h2>Galáxias</h2>
        <div class="image-container">
            <img src="imagens/galaxia.jpg" alt="Imagem de uma galáxia">
        </div>
    </section>

    <footer>
        <p>Exploração Astronômica &copy; 2026</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
